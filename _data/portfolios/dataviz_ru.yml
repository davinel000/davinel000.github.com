projects:
  - slug: "edit-wars"
    period: "2022-2025"
    title: "Edit Wars Project"
    subtitle: ""
    images:
      - src: "/docs/portfolios/images/2022_editwars/editwars_website_network.png"
        alt: "Edit Wars — сетевой граф"
        caption: "Динамический трёхмерный сетевой граф - часть исследовательской платформы"
      - src: "/docs/portfolios/images/2022_editwars/editwars_dashboard_barcharts.png"
        alt: "Edit Wars — дашборд с барчартами"
        caption: "Один из исследовательских Tableau-дашбордов для работы с корпусом заголовков."
      - src: "/docs/portfolios/images/2022_editwars/editwars_website_linegraph.png"
        alt: "Edit Wars — линейный график на сайте"
        caption: "Линейные графики для публикации на веб-платформе."
    description:
      - "Междисциплинарный проект о языке российской пропаганды для международной аудитории. Команда исследовала медианарративы и их развитие с начала 2022 года на корпусе более чем из 500 тысяч заголовков."
      - "Визуализации должны была работать как аналитический инструмент для команды и как понятные интересные графики для аудитории. Я делал Tableau-дашборды для поиска и анализа заголовков, проектировал визуальную логику лонгридов и участвовал в разработке исследовательского интерфейса. В результате появились инструменты для внутренней аналитики и веб-визуализации для публикации результатов."
      - "Данные и визуализации использовались на сайте проекта и в мультимедийной инсталляции. Проект реализован при поддержке Media Futures и в 2022 году получил награду Artist for Media."
            
    role: "Координация, дашборды, дизайн визуализаций, методика"
