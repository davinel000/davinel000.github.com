  - slug: "kommunalnye-tayny"
    period: "2017"
    title: "Коммунальные тайны"
    subtitle: "Дата-расследование жилищно-коммунальной сферы Санкт-Петербурга"
    images:
      - src: "/docs/portfolios/images/2017_housing_secrets/housing_secrets_tableau2.png"
        alt: "Коммунальные тайны — Дома"
        caption: "Интерактивный сервис и дашборд для работы с данными по домам"
      - src: "/docs/portfolios/images/2017_housing_secrets/housing_secrets_tableau.png"
        alt: "Коммунальные тайны — УК"
        caption: "Дашборд-рейтинг отклонений в начислениях по управляющим компаниям"
      - src: "/docs/portfolios/images/2017_housing_secrets/housing_secrets_dp.png"
        alt: "Коммунальные тайны — ДП"
        caption: "Публикация на сайте ДП."
    description:
      - "Вместе с журналисткой Ириной Панкратовой (на тот момент «Деловой Петербург») и командой «Инфометра» сделали расследование, насколько корректно управляющие компании показывают начисления за коммунальные услуги. Взяли данные reformagkh.ru и превратили сложный массив в понятный материал и в полезный сервис, где можно проверить ситуацию по конкретной компании и по конкретному дому, а также написать жалобу или заявление."
      - "Я собирал данные, создал визуальную логику Tableau-части - дашборда по компаниям, и участвовал в подготовке лонгрида. Задачей было не просто показать несколько графиков, но и рассказать о масштабе проблемы, сделать интерфейс, который работает как точка входа в расследование и CTA."
      - "Публикация ДП с собственным интерфейсом калькулятора получила больше 35 тысяч просмотров, а дашборды Tableau по 11 и 18 тысяч. Победа в номинации «Лучшее исследование на основе открытых данных» на Opendatacontest 2018."
    role: "Сбор и визуализация данных, Tableau-дашборд, аналитика"
    tools: "Tableau, Tilda, reformagkh API"
    team: "Ирина Панкратова («ДП»), Сергей Бабушкин («Инфометр»)"
    links:
      - label: "Видео демо"
        url: "https://www.youtube.com/watch?v=Mv6pXmjVUuE"
