  - slug: "partyhard"
    period: "2016"
    title: "Исследования политических партий"
    subtitle: ""
    images: 
         
      
      - src: "/docs/portfolios/images/2016_partyhard/partyhard_treemap.png"
        alt: "Золото партий — treemap"
        caption: "Диаграмма со всеми пожертвованиями партиям и фильтрами"

      - src: "/docs/portfolios/images/2016_partyhard/partyhard_sexage.png"
        alt: "Золото партий — барчарт"
        caption: "Аналитический блок о структуре жертвователей партий"

      - src: "/docs/portfolios/images/2016_partyhard/partyhard_words.png"
        alt: "Атака клоунов — облако слов"
        caption: "Анализ ключевых тем в программах партий."

      - src: "/docs/portfolios/images/2016_partyhard/partyhard_views.png"
        alt: "Атака клоунов — облако слов"
        caption: "Взгляды подписчиков партий в соцсетях"


    description:
      # - "Три спецпроекта «Инфометра» о Российских политических партиях времен, когда партий резко стало много, но непонятно, зачем и почему. На основе публичных отчетов о пожертвованиях мы опубликовали «Золото Партий», узнали, кто финансирует крупные и мелкие политические объединения, и как много подозрений это вызывает. Потом в «Атаке Клоунов» качественно и количественно проанализировали их официальные программы, найдя много прозрачных заимствований и популизма, а также сделали подборку безапелляционных и бессмысленных заявлений. Наконец, в «Мертвых Душах» проанализировали их слабоактивные паблики в соцсетях, профили их подписчиков и искусственную активность."
      - "Серия спецпроектов «Инфометра» о российских политических партиях. На основе публичных данных о пожертвованиях, программ партий и их присутствии в соцсетях мы делали расследовательские публикации и визуальные инструменты для анализа структуры финансирования, тематики и аудитории."
      - "Я делал интерактивные дашборды по пожертвованиям и половозрастным срезам, сетевые графы по подписчикам и статичные визуальные блоки для публикаций. Важной задачей было дать доступ и к общей картине, и к просмотру отдельных элементов данных."
      - "Первый проект при информационной поддержке Forbes обеспечил больше 50 тысяч просмотров и победил в Opendatacontest 2017 как лучшее исследование на открытых данных, а вторые два при поддержке «Коммерсанта» набрали примерно по 30 тысяч."
    role: "Визуальные блоки и диаграммы в составе проектной команды"
    tools: "Tableau, редакционная сборка, визуальные блоки"
    team: "Совместно с командой «Инфометр»"
    metrics: "Материал набрал более 11 000 просмотров"
    links:
