hero:
  eyebrow: "Привет, это Слава Романов"
  title: "Dataviz и аналитика"
  lede: "Исследовательские дашборды, лонгриды и визуальные инструменты на основе открытых данных для медиа, civic tech и правозащитных проектов"
profile:
  label: "Профиль"
  title: "Чем я занимаюсь"
  paragraphs:
    - "С 2012 года работаю в проектах о доступе к информации, open data, мониторинге цифровой среды и профессиональных правах адвокатов. С 2015 года регулярно делаю визуализации и исследовательские дашборды, а с 2020 года также работаю с мультимедиа-инсталляциями и внедряю данные в пространственные и экранные проекты."
    - "Стремлюсь создавать визуализации, которые либо рассказывают историю, либо работают как аналитический инструмент. Мне интересны социально значимые проекты и интерфейсы, которые помогают командам проверять гипотезы, искать паттерны и обновлять исследования по мере роста датасета."
  facts:
    - label: "Инструменты"
      text: "Tableau, Datawrapper, Infogr.am, Figma, Illustrator, CorelDRAW, Python, базовый d3.js, p5.js, табличные редакторы."
    - label: "Аналитика"
      text: "Поиск, очистка и структурирование машиночитаемых данных, работа с большими текстовыми корпусами, regexp, топикальный анализ, базовая автоматизация пайплайнов."
    - label: "Практический контекст"
      text: "НКО, медиа-дизайн, civic tech, исследовательские спецпроекты, циклы правок и работа с междисциплинарными командами."
