    description:
      - src: "/docs/portfolios/images/2016_infometer/infometer_fsin.png"
        alt: "Инфометр — ФСИН"
        caption: "Дашборд из спецпроекта по закупкам ФСИН"
    description:
      - "Проектный центр «Инфометр» исследовал соблюдение права на доступ к информации в России, публиковал рейтинги информационной открытости органов власти, аналитические выкладки, дата-расследования и серийные визуальные форматы."
      - "В «Инфометре» я прошел путь от эксперта до директора по аналитике и участвовал в создании множества визуальных форматов: интерактивных и статичных диаграмм, сравнительных блоков, лонгридов и шаблонов для регулярных публикаций рейтингов и мониторингов."      
      - "За время работы мы провели более ста циклов мониторинга и опубликовали около 90 материалов. Для меня это была практика серийной дата-визуализации, внедрения шаблонов и работы с редакционно-аналитической командой."
    tools: "Tableau, Tilda, Datawrapper, Infogr.am"
