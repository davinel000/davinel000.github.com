extra_case:
  slug: "in-the-digital-shadow"
  period: "2026"
  name: "in the digital shadow"
  subtitle: ""
  images:
    - src: "/docs/portfolios/images/2026_inthedigitalshadow/figure_3_collect.jpg"
      alt: "in the digital shadow - масса проекта"
      caption: "Как проект накапливает массу - вещей, цифровых данных и коммуникации"

    - src: "/docs/portfolios/images/2026_inthedigitalshadow/figure_4_allocate.jpg"
      alt: "in the digital shadow - allocation"
      caption: "Как проект распределяет приоритеты"

    - src: "/docs/portfolios/images/2026_inthedigitalshadow/figure_6_delegate_request_fixed.jpg"
      alt: "in the digital shadow - delegation"
      caption: "Что и кому делегируется в ходе проекта - анализ корпуса переписок"

    - src: "/docs/portfolios/images/2026_inthedigitalshadow/figure_8_overload_timeline.jpg"
      alt: "in the digital shadow - график перегрузок"
      caption: "Анализ психофизиологических маркеров в ходе реализации проекта"
  description:
    # - "В моем художественном проекте о ретроспективном рефлективном анализе собственной предыдущей креативной практики я объединил дебрифинг-подход с экспериментальной дата-визуализацией и интерактивной инсталляцией. Накопленные массивы данных о бюджетах, файлах, выгрузки коммуникации в мессенджерах с проектной командой и в интерфейсе ChatGPT, а также биометрические данные и личные дневники - становятся частью общей системы - накопления, перераспределения, делегирования и перегрузки."
    - "Проект о ретроспективном анализе собственной проектной практики на основе разнородных данных: бюджетов, файловой системы, переписки, биометрических показателей и рабочих дневников."
    # - "Результаты количественного и качественного анализа данных, с учетом тем, направлений делегирования, стали основой для статических диаграмм. Это линейные графики роста массы проекта, диаграммы Гантта, сравнивающие запланированное и реализованное, барчарты о том, что мы доверяем людям, а что ии, и как психофизиологическая нагрузка распределяется в ходе проекта, от запуска до релиза."
    - "На основе этого массива я подготовил серию статичных диаграмм: графики роста проектной массы, диаграммы распределения задач, сравнение запланированного и реализованного, а также визуализации перегрузки и делегирования."
    # - "Эта работа - модель для личной и профессиональной рефлексии художника или координатора проекта. Физически она воплощена в пространственной инсталляции"
    - "Для меня это пример того, как методы визуализации данных можно применять не только в медиа- и исследовательских проектах, но и в рефлексивной авторской работе."
  role: "Сборка и интерпретация данных, подготовка статических диаграмм"
  tools: "Tableau, Python, TouchDesigner, GPT Codex, CorelDRAW"
  links:
    - label: "Key findings"
      url: "https://github.com/davinel000/inthedigitalshadow/blob/main/docs/key-findings.md"
    - label: "Об инсталляции"
      url: "https://www.slavaromanov.art/2026/in-the-digital-shadow"
